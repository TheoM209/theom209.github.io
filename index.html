            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar img {
            height: 40px;
            width: auto;
        }
        .navbar ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;

        .navbar li {
            margin-right: 20px;
        }
        .navbar li:last-child {

        .navbar a {
            color: white;

        }
        .navbar a:hover {
            text-decoration: underline;
        }

        }
